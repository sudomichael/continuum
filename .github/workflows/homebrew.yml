# Auto-bumps sudomichael/homebrew-tap's Formula/continuum.rb on every new
# v* tag, using the SHA256SUMS we just published to the release.
#
# Runs after the main release.yml workflow has uploaded SHA256SUMS — we
# wait on `needs: <release-job>` if both run on the same tag push. For
# simplicity right now this is a separate workflow triggered on the same
# tag, kicked off after a 60-second delay so the release assets are
# uploaded first.

name: homebrew-bump

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version + SHA256SUMS
        id: meta
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -eu
          version="${TAG#v}"
          sums="$(curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${TAG}/SHA256SUMS")"
          # Each line: "<sha256>  continuum-<os>-<arch>[.exe]"
          extract() {
            echo "$sums" | awk -v file="$1" '$2 == file { print $1; exit }'
          }
          echo "version=$version"                                       >> $GITHUB_OUTPUT
          echo "sha_darwin_arm64=$(extract continuum-darwin-arm64)"     >> $GITHUB_OUTPUT
          echo "sha_darwin_amd64=$(extract continuum-darwin-amd64)"     >> $GITHUB_OUTPUT
          echo "sha_linux_arm64=$(extract continuum-linux-arm64)"       >> $GITHUB_OUTPUT
          echo "sha_linux_amd64=$(extract continuum-linux-amd64)"       >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: sudomichael/homebrew-tap
          token: ${{ secrets.TAP_REPO_TOKEN }}
          path: tap

      - name: Patch formula
        env:
          V: ${{ steps.meta.outputs.version }}
          S_DA: ${{ steps.meta.outputs.sha_darwin_arm64 }}
          S_DI: ${{ steps.meta.outputs.sha_darwin_amd64 }}
          S_LA: ${{ steps.meta.outputs.sha_linux_arm64 }}
          S_LI: ${{ steps.meta.outputs.sha_linux_amd64 }}
        working-directory: tap
        run: |
          set -eu
          formula=Formula/continuum.rb
          python3 - <<PY
          import re
          path = "$formula"
          s = open(path).read()

          # version "X.Y.Z"
          s = re.sub(r'^(\s*version\s+)"[^"]+"', r'\1"$V"', s, count=1, flags=re.M)

          # Replace the FIRST sha256 in each on_macos/on_arm / on_intel /
          # on_linux/on_arm / on_intel block, ordered top-to-bottom.
          replacements = ["$S_DA", "$S_DI", "$S_LA", "$S_LI"]
          def gen():
              for r in replacements: yield r
          it = gen()
          s = re.sub(
              r'(sha256\s+")[^"]+(")',
              lambda m: m.group(1) + next(it) + m.group(2),
              s,
          )

          open(path, "w").write(s)
          PY
          cat $formula

      - name: Commit + push
        working-directory: tap
        env:
          V: ${{ steps.meta.outputs.version }}
        run: |
          set -eu
          git config user.name  "continuum-bot"
          git config user.email "bot@getcontinuum.dev"
          git add Formula/continuum.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "continuum $V"
          git push

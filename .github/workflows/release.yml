# Builds the Continuum CLI for 5 OS/arch targets on every tag push (v*),
# uploads each binary + a SHA256SUMS manifest to the GitHub Release.
#
# To cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Outputs in the release:
#   continuum-darwin-arm64
#   continuum-darwin-amd64
#   continuum-linux-arm64
#   continuum-linux-amd64
#   continuum-windows-amd64.exe
#   SHA256SUMS              ← verified by install.sh before exec
#
# We also publish the Homebrew formula update on the same trigger — see
# homebrew.yml in this dir.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - target: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o ../dist/continuum-${{ matrix.target }}${{ matrix.ext }} \
            .

      - name: Upload artifact (intermediate)
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/continuum-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 1

  # One release job aggregates the matrix outputs, computes a single
  # SHA256SUMS manifest, and uploads everything as one Release. This is the
  # pattern goreleaser uses; install.sh fetches SHA256SUMS first and
  # verifies the binary against it before chmod+x.
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          ls -la
          sha256sum continuum-* > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/continuum-*
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true

  # Auto-bump the Homebrew formula at sudomichael/homebrew-tap right after
  # publishing. Runs as a downstream job (vs. the standalone release:published
  # workflow we tried first) because GitHub deliberately does NOT fire the
  # `release:published` event when the release is created by GITHUB_TOKEN —
  # a documented anti-loop guard. Same-workflow job avoids that.
  homebrew:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version + SHA256SUMS
        id: meta
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          version="${TAG#v}"
          sums="$(curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${TAG}/SHA256SUMS")"
          extract() {
            echo "$sums" | awk -v file="$1" '$2 == file { print $1; exit }'
          }
          {
            echo "version=$version"
            echo "sha_darwin_arm64=$(extract continuum-darwin-arm64)"
            echo "sha_darwin_amd64=$(extract continuum-darwin-amd64)"
            echo "sha_linux_arm64=$(extract continuum-linux-arm64)"
            echo "sha_linux_amd64=$(extract continuum-linux-amd64)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: sudomichael/homebrew-tap
          token: ${{ secrets.TAP_REPO_TOKEN }}
          path: tap

      - name: Patch formula
        env:
          V: ${{ steps.meta.outputs.version }}
          S_DA: ${{ steps.meta.outputs.sha_darwin_arm64 }}
          S_DI: ${{ steps.meta.outputs.sha_darwin_amd64 }}
          S_LA: ${{ steps.meta.outputs.sha_linux_arm64 }}
          S_LI: ${{ steps.meta.outputs.sha_linux_amd64 }}
        working-directory: tap
        run: |
          set -eu
          python3 - <<'PY'
          import os, re
          path = "Formula/continuum.rb"
          s = open(path).read()
          v   = os.environ["V"]
          shas = [os.environ[k] for k in ("S_DA","S_DI","S_LA","S_LI")]

          # Bump version "X.Y.Z" on the first match.
          s = re.sub(r'^(\s*version\s+)"[^"]+"', f'\\1"{v}"', s, count=1, flags=re.M)

          # Replace the 4 sha256 lines, top-to-bottom, in order:
          # darwin/arm, darwin/amd, linux/arm, linux/amd
          it = iter(shas)
          s = re.sub(
              r'(sha256\s+")[^"]+(")',
              lambda m: m.group(1) + next(it) + m.group(2),
              s,
          )
          open(path, "w").write(s)
          PY
          cat Formula/continuum.rb

      - name: Commit + push
        working-directory: tap
        env:
          V: ${{ steps.meta.outputs.version }}
        run: |
          set -eu
          git config user.name  "continuum-bot"
          git config user.email "bot@getcontinuum.dev"
          git add Formula/continuum.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "continuum $V"
          git push

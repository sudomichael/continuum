# Builds the Continuum CLI for 5 OS/arch targets on every tag push (v*),
# uploads each binary to the GitHub Release. The install.sh script consumes
# these as `continuum-<os>-<arch>[.exe]`.
#
# To cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# That fires this workflow. It auto-creates a Release for the tag if one
# doesn't exist yet (softprops/action-gh-release).

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - target: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o ../dist/continuum-${{ matrix.target }}${{ matrix.ext }} \
            .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/continuum-${{ matrix.target }}${{ matrix.ext }}
          fail_on_unmatched_files: true
          generate_release_notes: true

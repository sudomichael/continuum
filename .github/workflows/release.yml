# Builds the Continuum CLI for 5 OS/arch targets on every tag push (v*),
# uploads each binary + a SHA256SUMS manifest to the GitHub Release.
#
# To cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Outputs in the release:
#   continuum-darwin-arm64
#   continuum-darwin-amd64
#   continuum-linux-arm64
#   continuum-linux-amd64
#   continuum-windows-amd64.exe
#   SHA256SUMS              ← verified by install.sh before exec
#
# We also publish the Homebrew formula update on the same trigger — see
# homebrew.yml in this dir.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - target: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o ../dist/continuum-${{ matrix.target }}${{ matrix.ext }} \
            .

      - name: Upload artifact (intermediate)
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/continuum-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 1

  # One release job aggregates the matrix outputs, computes a single
  # SHA256SUMS manifest, and uploads everything as one Release. This is the
  # pattern goreleaser uses; install.sh fetches SHA256SUMS first and
  # verifies the binary against it before chmod+x.
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          ls -la
          sha256sum continuum-* > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/continuum-*
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true

name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please skim existing issues — there's a decent chance someone's already raised this.
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What are you trying to do, and what's blocking you?
      placeholder: "When I open a new repo in Claude Code, I want ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Be as concrete as you can. A rough UI sketch is fine.
  - type: textarea
    id: alternatives
    attributes:
      label: What have you tried, or ruled out?

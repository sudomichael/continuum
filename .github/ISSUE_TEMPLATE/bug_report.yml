name: Bug report
description: Something doesn't work the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in what you can — partial reports are still useful.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, short description of the actual behavior.
      placeholder: "When I run `continuum connect`, ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "I expected ..."
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Minimal steps to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: input
    id: continuum-version
    attributes:
      label: Continuum version
      description: Output of `continuum version` (or the web app version visible in the bottom-left).
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: "macOS 15.3, arm64"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
